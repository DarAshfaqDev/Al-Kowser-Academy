<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Al Kawser</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0B1A2E;
      color: #EDE8DC;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 520px; }
    .code { font-size: 7rem; font-weight: 900; font-family: 'Cinzel', serif; color: #C9A84C; line-height: 1; }
    .star { font-size: 1.5rem; color: #C9A84C; margin: 0.5rem 0; }
    h1 { font-family: 'Cinzel', serif; font-size: 1.6rem; color: #EDE8DC; margin: 1rem 0 0.5rem; }
    p { color: #A89880; line-height: 1.7; margin-bottom: 2rem; font-size: 1rem; }
    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      border: 1px solid #C9A84C;
      color: #C9A84C;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn:hover { background: #C9A84C; color: #0B1A2E; }
    .arabic { font-family: 'Amiri', serif; font-size: 1.3rem; color: #6B5D45; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="star">✦</div>
    <h1>This page does not exist</h1>
    <p>The page you're looking for may have been moved or never existed. Return to the learning platform.</p>
    <a href="/" class="btn"><i class="fas fa-arrow-left"></i> Return Home</a>
    <div class="arabic">وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ</div>
  </div>
</body>
</html>
